<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AV Action</title>
<style>
:root{
  --bg:#0d0f14;--surface:#13161e;--s2:#1a1e28;--s3:#222736;
  --border:#2a2f3d;--accent:#5b6af5;--a2:#8b96ff;
  --gold:#f0b429;--green:#34d399;--red:#f87171;--orange:#fb923c;
  --text:#e8eaf0;--muted:#6b7280;--muted2:#9ca3af;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.hidden{display:none!important;}
input,textarea,select,button{font-family:inherit;font-size:14px;}
button{cursor:pointer;touch-action:manipulation;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;background:radial-gradient(ellipse at 60% 30%,rgba(91,106,245,.12),transparent 70%);}
.lbox{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;}
.llogo{font-size:26px;font-weight:800;color:var(--a2);margin-bottom:4px;}
.lsub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:28px;}
.lbox input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;color:var(--text);outline:none;margin-bottom:10px;}
.lbox input:focus{border-color:var(--accent);}
.lbtn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:600;}
.lerr{color:var(--red);font-size:13px;margin-top:8px;text-align:center;}

/* APP */
#app{display:none;flex-direction:column;height:100vh;height:100dvh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;}
.tlogo{font-size:16px;font-weight:800;color:var(--a2);}
.tright{display:flex;align-items:center;gap:8px;}
.trole{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.r-admin{background:rgba(91,106,245,.2);color:var(--a2);}
.r-student{background:rgba(52,211,153,.15);color:var(--green);}
.tname{font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.blogout{background:transparent;border:1px solid var(--border);color:var(--muted2);padding:5px 10px;border-radius:var(--r2);font-size:12px;}

/* NOTIF BADGE */
.notif-badge{background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;}

/* BODY */
.abody{display:flex;flex:1;overflow:hidden;}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.ssec{padding:14px 14px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;}
.nitem{display:flex;align-items:center;gap:9px;padding:10px 12px;margin:1px 8px;border-radius:var(--r2);cursor:pointer;color:var(--muted2);font-size:13px;font-weight:500;border:none;background:none;width:calc(100% - 16px);text-align:left;}
.nitem:hover{background:var(--s2);color:var(--text);}
.nitem.act{background:rgba(91,106,245,.15);color:var(--a2);font-weight:600;}
.sav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.stnav{margin:1px 8px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;display:flex;align-items:center;gap:8px;border:none;background:none;width:calc(100% - 16px);text-align:left;}
.stnav:hover{background:var(--s2);}
.stnav.act{background:rgba(91,106,245,.12);}
.stn{font-size:13px;font-weight:500;color:var(--text);}
.stm{font-size:11px;color:var(--muted);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 16px;padding-bottom:80px;}
@media(min-width:601px){.content{padding:24px 28px;padding-bottom:24px;}}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:60;padding:4px 0 env(safe-area-inset-bottom);}
.bottom-nav-inner{display:flex;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;color:var(--muted2);font-size:10px;font-weight:600;border:none;background:none;position:relative;}
.bnav-item.act{color:var(--a2);}
.bnav-icon{font-size:20px;}
@media(max-width:600px){.bottom-nav{display:block;}.sidebar{display:none;}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.ctitle{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.cdot{width:7px;height:7px;border-radius:50%;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.ptitle{font-size:18px;font-weight:800;}
.psub{font-size:12px;color:var(--muted);margin-top:2px;}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
label{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;}
input[type=text],input[type=date],input[type=password],input[type=email],textarea,select{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 12px;color:var(--text);font-size:14px;outline:none;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:70px;}
select option{background:var(--s2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.g2{grid-template-columns:1fr;}}

/* EMOJI PICKER */
.emoji-row{display:flex;gap:8px;justify-content:center;margin:8px 0;}
.emoji-opt{width:48px;height:48px;border-radius:50%;border:2px solid var(--border);background:var(--s2);cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.emoji-opt:hover{border-color:var(--accent);transform:scale(1.1);}
.emoji-opt.sel{border-color:var(--accent);background:rgba(91,106,245,.2);transform:scale(1.15);}

/* RADIO */
.rg{display:flex;flex-wrap:wrap;gap:7px;}
.ro{padding:8px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:13px;color:var(--muted2);user-select:none;white-space:nowrap;}
.ro:hover{border-color:var(--accent);color:var(--text);}
.sg{background:rgba(52,211,153,.15);border-color:var(--green);color:var(--green);}
.so{background:rgba(251,146,60,.15);border-color:var(--orange);color:var(--orange);}
.sr{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red);}
.sgold{background:rgba(240,180,41,.15);border-color:var(--gold);color:var(--gold);}
.sgr{background:rgba(107,114,128,.2);border-color:var(--muted);color:var(--muted2);}
.sb{background:rgba(91,106,245,.15);border-color:var(--a2);color:var(--a2);}

/* BTNS */
.btn{padding:10px 16px;border-radius:var(--r2);border:none;font-size:13px;font-weight:600;touch-action:manipulation;cursor:pointer;}
.bp{background:var(--accent);color:#fff;}
.bg2{background:var(--s2);color:var(--muted2);border:1px solid var(--border);}
.bg2:hover{color:var(--text);border-color:var(--accent);}
.bd{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.bgold{background:rgba(240,180,41,.1);color:var(--gold);border:1px solid rgba(240,180,41,.2);}
.bgreen{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2);}
.bsm{padding:6px 11px;font-size:12px;}

/* BADGES */
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.bg_{background:rgba(52,211,153,.15);color:var(--green);}
.bo_{background:rgba(251,146,60,.15);color:var(--orange);}
.br_{background:rgba(248,113,113,.15);color:var(--red);}
.bgold_{background:rgba(240,180,41,.15);color:var(--gold);}
.bgr_{background:rgba(107,114,128,.2);color:var(--muted2);}
.bb_{background:rgba(91,106,245,.15);color:var(--a2);}

/* PROGRESS BAR */
.prog-wrap{background:var(--s3);border-radius:8px;height:10px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:8px;transition:width .6s ease;}

/* FASES */
.fase-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.fase-card.ativa{border-color:var(--accent);background:rgba(91,106,245,.08);}
.fase-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}

/* CONQUISTAS */
.conquista-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.conquista-card.desbloqueada{border-color:var(--gold);background:rgba(240,180,41,.06);}
.conquista-icon{font-size:28px;flex-shrink:0;}
.conquista-locked{filter:grayscale(1);opacity:.4;}

/* TIMELINE */
.tl-dia{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.tl-dia-avatar{width:36px;height:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid var(--border);}
.tl-dia-avatar.validado{border-color:var(--green);}
.tl-dia-avatar.rejeitado{border-color:var(--red);}
.tl-dia-avatar.pendente{border-color:var(--gold);}

/* VALIDAÇÃO */
.validar-card{background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.25);border-radius:var(--r);padding:14px;margin-bottom:10px;}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
@media(min-width:500px){.sgrid{grid-template-columns:repeat(4,1fr);}}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.sv{font-size:24px;font-weight:800;}
.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}

/* AI */
.aibox{background:linear-gradient(135deg,rgba(91,106,245,.08),transparent);border:1px solid rgba(91,106,245,.2);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.aititle{font-size:11px;font-weight:700;color:var(--a2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.aitxt{font-size:13px;color:var(--text);line-height:1.8;}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--surface);padding:4px;border-radius:var(--r);border:1px solid var(--border);width:100%;overflow-x:auto;margin-bottom:18px;}
.tab{padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted2);white-space:nowrap;border:none;background:none;}
.tab.act{background:var(--accent);color:#fff;}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
@media(min-width:601px){.moverlay{align-items:center;}}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-height:90vh;overflow-y:auto;}
@media(min-width:601px){.mbox{border-radius:16px;width:540px;max-width:96vw;}}
.mtitle{font-size:17px;font-weight:800;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* FAB */
.fab{position:fixed;bottom:80px;right:20px;z-index:100;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:14px 20px;font-size:15px;font-weight:700;box-shadow:0 4px 20px rgba(91,106,245,.5);}
@media(min-width:601px){.fab{bottom:28px;right:28px;}}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--accent);border-radius:var(--r);padding:12px 20px;font-size:13px;color:var(--a2);z-index:300;animation:tin .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap;max-width:90vw;}
@media(min-width:601px){.toast{bottom:24px;}}
@keyframes tin{from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* STREAK FIRE */
.streak{display:flex;align-items:center;gap:6px;background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.25);border-radius:var(--r);padding:10px 14px;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">AV Action</div>
    <div class="lsub">Inteligência Comportamental</div>
    <input type="text" id="lu" placeholder="Usuário" autocapitalize="none">
    <input type="password" id="lp" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">Entrar</button>
    <div class="lerr hidden" id="lerr">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tlogo">AV Action</div>
    <div class="tright">
      <span class="trole" id="roleTag"></span>
      <span class="tname" id="tname"></span>
      <button class="blogout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="abody">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
  <div class="bottom-nav hidden" id="bottomNav">
    <div class="bottom-nav-inner">
      <button class="bnav-item" id="bn_painel" onclick="setPage('aluno_painel')"><span class="bnav-icon">🏠</span>Início</button>
      <button class="bnav-item" id="bn_registro" onclick="setPage('aluno_form')"><span class="bnav-icon">📝</span>Registro</button>
      <button class="bnav-item" id="bn_ranking" onclick="setPage('aluno_ranking')"><span class="bnav-icon">🚀</span>Ranking</button>
      <button class="bnav-item" id="bn_evolucao" onclick="setPage('aluno_evolucao')"><span class="bnav-icon">📈</span>Evolução</button>
      <button class="bnav-item" id="bn_conquistas" onclick="setPage('aluno_conquistas')"><span class="bnav-icon">🏆</span>Conquistas</button>
    </div>
  </div>
</div>

<button class="fab hidden" id="fab" onclick="openModal('registro')">+ Registro</button>

<div id="mo" class="moverlay hidden" onclick="closeModalOutside(event)">
  <div class="mbox" id="mb"></div>
</div>

<script>
// ══════════════════════════════════════════════
// SYNC — JSONBin
// ══════════════════════════════════════════════
const BIN_ID='6a3b57aada38895dfef54bb1';
const BIN_KEY='$2a$10$0PJPGRLe/JY7laW56/CGuegftbFHvq5ieRPNWRq62tovlVJHEgBTm';
const BIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
const LS_KEY='avaction_v4';

function loadLocal(){
  try{const r=localStorage.getItem(LS_KEY);if(r)return JSON.parse(r);}catch(e){}
  return{users:[{id:'u1',username:'admin',password:'admin123',role:'admin',nome:'Maísa'}],students:[],registros:[],analises:[],validacoes:[]};
}
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(db));}catch(e){}}

let db=loadLocal();
let CU=null,CP='dashboard',CSid=null,RV={};
async function remoteGet(){
  try{const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY}});if(!r.ok)return null;const j=await r.json();return j.record||null;}catch(e){return null;}
}
async function remoteSet(d){
  try{await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},body:JSON.stringify(d)});}catch(e){}
}
async function save(){
  db._ts=Date.now();saveLocal();
  try{if(bc)bc.postMessage({db});}catch(e){}
  await remoteSet(db);
}
let bc=null;
try{bc=new BroadcastChannel('avaction_v5');bc.onmessage=e=>{if(e.data?.db){db=e.data.db;saveLocal();if(CU)renderApp();}};}catch(e){}
async function initSync(){
  const r=await remoteGet();
  if(r?.users){if(!db._ts||(r._ts&&r._ts>db._ts)){db=r;['users','students','registros','analises','validacoes'].forEach(k=>{if(!db[k])db[k]=[];});saveLocal();}}
  else{db._ts=Date.now();await remoteSet(db);}
  setInterval(async()=>{const r=await remoteGet();if(r&&(r._ts||0)>(db._ts||0)){db=r;['users','students','registros','analises','validacoes'].forEach(k=>{if(!db[k])db[k]=[];});saveLocal();if(CU)renderApp();if(CU&&CU.role==='admin')setTimeout(()=>verificarAnaliseAuto(),2000);}},5000);
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function today(){return new Date().toISOString().slice(0,10);}
function fdate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function acolor(n){const c=['#5b6af5','#34d399','#f0b429','#f87171','#a78bfa','#38bdf8','#fb923c'];let h=0;for(let ch of(n||'?'))h=ch.charCodeAt(0)+((h<<5)-h);return c[Math.abs(h)%c.length];}
function ini(n){return(n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3200);}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}

// FASES
const FASES=[
  {nome:'Ativação',inicio:1,fim:7,cor:'#fb923c'},
  {nome:'Instalação de Hábito',inicio:8,fim:21,cor:'#5b6af5'},
  {nome:'Consistência',inicio:22,fim:42,cor:'#34d399'},
  {nome:'Performance',inicio:43,fim:100,cor:'#f0b429'}
];
function getFaseAtual(dias){
  if(dias<=0)return FASES[0];
  return FASES.find(f=>dias>=f.inicio&&dias<=f.fim)||FASES[FASES.length-1];
}
function getDiasValidados(sid){
  return(db.registros||[]).filter(r=>
    r.studentId===sid &&
    r.validado===true &&
    r.campos?.estudou==='Sim'
  ).length;
}

// CONQUISTAS
const CONQUISTAS_DEF=[
  {id:'c1',nome:'Primeiro Passo',desc:'Enviou o primeiro registro',icon:'🌱',check:s=>getDiasValidados(s.id)>=1},
  {id:'c2',nome:'1 Semana',desc:'7 dias validados',icon:'🔥',check:s=>getDiasValidados(s.id)>=7},
  {id:'c3',nome:'2 Semanas',desc:'14 dias validados',icon:'💪',check:s=>getDiasValidados(s.id)>=14},
  {id:'c4',nome:'21 Dias',desc:'Instalação de Hábito concluída',icon:'🧠',check:s=>getDiasValidados(s.id)>=21},
  {id:'c5',nome:'1 Mês',desc:'30 dias validados',icon:'🏅',check:s=>getDiasValidados(s.id)>=30},
  {id:'c6',nome:'Consistência',desc:'42 dias validados',icon:'⭐',check:s=>getDiasValidados(s.id)>=42},
  {id:'c7',nome:'Performance',desc:'60 dias validados',icon:'🏆',check:s=>getDiasValidados(s.id)>=60},
  {id:'c8',nome:'Lenda',desc:'100 dias validados',icon:'👑',check:s=>getDiasValidados(s.id)>=100},
];

function getStreak(sid){
  const datas=(db.registros||[])
    .filter(r=>r.studentId===sid&&r.validado===true&&r.campos?.estudou==='Sim')
    .map(r=>r.data).sort((a,b)=>b.localeCompare(a));
  if(!datas.length)return 0;
  let streak=0;
  let esperado=new Date(today());
  for(let i=0;i<datas.length;i++){
    const d=new Date(datas[i]);
    const diff=Math.round((esperado-d)/86400000);
    if(diff===0||diff===streak){streak++;esperado=new Date(d);esperado.setDate(esperado.getDate()-1);}
    else if(diff>1)break;
  }
  return streak;
}

// EMOJIS DISPOSIÇÃO
const EMOJIS=[
  {val:'Muito Baixa',emoji:'😔',label:'Muito Baixa'},
  {val:'Baixa',emoji:'😕',label:'Baixa'},
  {val:'Média',emoji:'😐',label:'Normal'},
  {val:'Boa',emoji:'🙂',label:'Motivado'},
  {val:'Excelente',emoji:'😁',label:'Muito Motivado'},
];

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
function doLogin(){
  const u=gv('lu').toLowerCase().trim(),p=gv('lp');
  const f=(db.users||[]).find(x=>x.username===u&&x.password===p);
  if(!f){document.getElementById('lerr').classList.remove('hidden');return;}
  CU=f;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tname').textContent=f.nome;
  const rt=document.getElementById('roleTag');
  rt.textContent=f.role==='admin'?'Admin':'Aluno';
  rt.className='trole '+(f.role==='admin'?'r-admin':'r-student');
  if(f.role==='admin'){document.getElementById('fab').classList.remove('hidden');CP='dashboard';
    // Verifica análises automáticas ao fazer login como admin
    setTimeout(()=>verificarAnaliseAuto(),3000);
  }
  else{document.getElementById('bottomNav').classList.remove('hidden');CP='aluno_painel';}
  renderApp();
}
function doLogout(){
  CU=null;CP='dashboard';CSid=null;
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bottomNav').classList.add('hidden');
  document.getElementById('lu').value='';document.getElementById('lp').value='';
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderApp(){renderSidebar();renderContent();updateBN();}
function setPage(p,sid){CP=p;if(sid!==undefined)CSid=sid;renderApp();}

function updateBN(){
  if(!CU||CU.role!=='student')return;
  const map={'aluno_painel':'painel','aluno_form':'registro','aluno_hist':'registro','aluno_ranking':'ranking','aluno_evolucao':'evolucao','aluno_conquistas':'conquistas','aluno_perfil':'perfil'};
  ['painel','registro','ranking','evolucao','conquistas'].forEach(k=>{
    const el=document.getElementById('bn_'+k);
    if(el)el.className='bnav-item'+(map[CP]===k?' act':'');
  });
}

function getPendentes(){
  return(db.registros||[]).filter(r=>
    r.origem==='Aluno' &&
    (r.validado===null||r.validado===undefined) &&
    (r.campos?.disposicao||r.campos?.sentimento) // tem conteúdo real
  );
}

function renderSidebar(){
  const el=document.getElementById('sidebar');
  if(!CU){el.innerHTML='';return;}
  if(CU.role==='student'){el.innerHTML='';return;}
  const pend=getPendentes().length;
  el.innerHTML=`
    <div class="ssec">Menu</div>
    <button class="nitem ${CP==='dashboard'?'act':''}" onclick="CSid=null;setPage('dashboard')">🏠 Início</button>
    <button class="nitem ${CP==='validar'?'act':''}" onclick="setPage('validar')">✅ Validações${pend?`<span class="notif-badge">${pend}</span>`:''}
    </button>
    <button class="nitem ${CP==='usuarios'?'act':''}" onclick="setPage('usuarios')">👥 Usuários</button>
    <div class="ssec">Projetos</div>
    ${(db.students||[]).map(s=>`
      <button class="stnav ${CSid===s.id&&CP==='projeto'?'act':''}" onclick="setPage('projeto','${s.id}')">
        <div class="sav" style="background:${acolor(s.nome)}22;color:${acolor(s.nome)}">${ini(s.nome)}</div>
        <div><div class="stn">${s.nome}</div><div class="stm">${getDiasValidados(s.id)} dias</div></div>
      </button>`).join('')}
    <div style="padding:6px 8px">
      <button class="btn bg2 bsm" style="width:100%" onclick="openModal('newStudent')">+ Novo Aluno</button>
    </div>`;
}

function renderContent(){
  const el=document.getElementById('content');
  if(!CU){el.innerHTML='';return;}
  if(CU.role==='student'){
    const pages={
      'aluno_painel':alunoPanel,
      'aluno_form':alunoForm,
      'aluno_evolucao':alunoEvolucao,
      'aluno_conquistas':alunoConquistas,
      'aluno_perfil':alunoPerfil,
      'aluno_ranking':alunoRanking
    };
    el.innerHTML=(pages[CP]||alunoPanel)();return;
  }
  const pages={dashboard,validar:pageValidar,usuarios:pageUsuarios,projeto:pageProjeto};
  el.innerHTML=(pages[CP]||dashboard)();
}

function dashboard(){
  const sts=db.students||[];
  const pend=getPendentes().length;
  if(!sts.length)return`<div style="text-align:center;padding:50px 16px"><div style="font-size:40px;margin-bottom:12px">🚀</div><div style="font-size:16px;font-weight:800;margin-bottom:6px">Nenhum aluno ainda</div><button class="btn bp" style="margin-top:12px" onclick="openModal('newStudent')">+ Criar Aluno</button></div>`;
  const cards=sts.map(s=>{
    const dias=getDiasValidados(s.id);
    const fase=getFaseAtual(dias);
    const pct=dias<=0?0:Math.min(100,Math.round((dias-fase.inicio)/(fase.fim-fase.inicio+1)*100));
    const u=s.userId?(db.users||[]).find(x=>x.id===s.userId):null;
    const pendSt=(db.registros||[]).filter(r=>r.studentId===s.id&&(r.validado===null||r.validado===undefined)).length;
    return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${fase.cor}"></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="sav" style="width:38px;height:38px;font-size:14px;font-weight:800;border-radius:50%;background:${acolor(s.nome)}22;color:${acolor(s.nome)}">${ini(s.nome)}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700">${s.nome}</div>
          <div style="font-size:10px;color:var(--muted)">${fase.nome} · Dia ${dias}</div>
        </div>
        ${pendSt?`<span class="notif-badge" style="background:var(--gold);color:#000">${pendSt}</span>`:''}
      </div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${fase.cor}"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:10px">${pct}% da fase atual</div>
      ${u?`<div style="font-size:10px;color:var(--muted);margin-bottom:8px">Login: <b style="color:var(--a2);font-family:monospace">${u.username}</b> / <b style="color:var(--gold);font-family:monospace">${u.password}</b></div>`:''}
      <div style="display:flex;gap:5px">
        <button class="btn bg2 bsm" style="flex:1" onclick="setPage('projeto','${s.id}')">Ver projeto</button>
        <button class="btn bg2 bsm" onclick="openModal('editStudent','${s.id}')">✏️ Editar</button>
        <button class="btn bd bsm" data-sid="${s.id}" onclick="window.delSt(this.dataset.sid)">Encerrar Sessão</button>
      </div>
    </div>`;
  }).join('');
  return`
    <div class="ph">
      <div><div class="ptitle">Alunos</div></div>
      <div style="display:flex;gap:8px">
        ${pend?`<button class="btn bgold bsm" onclick="setPage('validar')">✅ ${pend} pendente${pend>1?'s':''}</button>`:''}
        <button class="btn bp bsm" onclick="openModal('newStudent')">+ Novo Aluno</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">${cards}</div>`;
}

window.delSt=function(sid){
  if(!confirm('Encerrar sessão deste aluno? Todos os registros serão removidos permanentemente.'))return;
  const st=(db.students||[]).find(s=>s.id===sid);
  if(st&&st.userId)db.users=(db.users||[]).filter(u=>u.id!==st.userId);
  db.students=(db.students||[]).filter(s=>s.id!==sid);
  db.registros=(db.registros||[]).filter(r=>r.studentId!==sid);
  db.analises=(db.analises||[]).filter(a=>a.studentId!==sid);
  if(CSid===sid){CSid=null;CP='dashboard';}
  save();toast('Aluno removido.');renderApp();
};

// ADMIN — VALIDAÇÕES

function pageValidar(){
  const pendentes=(db.registros||[]).filter(r=>
    r.origem==='Aluno' &&
    (r.validado===null||r.validado===undefined) &&
    (r.campos?.disposicao||r.campos?.sentimento)
  ).sort((a,b)=>b.data.localeCompare(a.data));
  if(!pendentes.length)return`<div style="text-align:center;padding:50px"><div style="font-size:40px;margin-bottom:12px">✅</div><div style="font-size:16px;font-weight:800">Tudo validado!</div><div style="color:var(--muted);margin-top:8px">Nenhum registro pendente.</div></div>`;
  const list=pendentes.map(r=>{
    const s=(db.students||[]).find(x=>x.id===r.studentId);
    const emoji=EMOJIS.find(e=>e.val===r.campos?.disposicao)||EMOJIS[2];
    const dias=getDiasValidados(r.studentId);
    const fase=getFaseAtual(dias);
    return`<div class="validar-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="sav" style="width:40px;height:40px;font-size:14px;font-weight:800;border-radius:50%;background:${acolor(s?.nome||'?')}22;color:${acolor(s?.nome||'?')}">${ini(s?.nome||'?')}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:800">${s?.nome||'Aluno'}</div>
          <div style="font-size:11px;color:var(--muted)">${fase.nome} · Dia ${dias} · ${fdate(r.data)}</div>
        </div>
        <span style="font-size:32px">${emoji.emoji}</span>
      </div>

      <div style="background:var(--s3);border-radius:var(--r2);padding:12px;margin-bottom:12px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:3px">Estudou</div>
            <div style="font-size:13px;font-weight:600;color:${r.campos?.estudou==='Sim'?'var(--green)':'var(--red)'}">${r.campos?.estudou==='Sim'?'✓ Sim':'✗ Não'}</div>
          </div>
          ${r.campos?.horas?`<div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:3px">Horas</div>
            <div style="font-size:13px;font-weight:600;color:var(--a2)">⏱ ${r.campos.horas}h</div>
          </div>`:''}
          <div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:3px">Disposição</div>
            <div style="font-size:13px">${emoji.emoji} ${emoji.label}</div>
          </div>
        </div>
        ${r.campos?.sentimento?`<div style="margin-bottom:8px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:3px">Como se sente</div><div style="font-size:13px;color:var(--muted2);font-style:italic">"${r.campos.sentimento}"</div></div>`:''}
        ${r.campos?.dificuldade?`<div style="margin-bottom:8px"><div style="font-size:10px;color:var(--red);text-transform:uppercase;margin-bottom:3px">⚠️ Dificuldade</div><div style="font-size:13px;color:var(--muted2)">${r.campos.dificuldade}</div></div>`:''}
        ${r.campos?.vitoria?`<div><div style="font-size:10px;color:var(--green);text-transform:uppercase;margin-bottom:3px">🏆 Vitória</div><div style="font-size:13px;color:var(--muted2)">${r.campos.vitoria}</div></div>`:''}
      </div>

      <div style="display:flex;gap:8px">
        <button class="btn bgreen" style="flex:1;padding:11px;font-size:14px" data-rid="${r.id}" onclick="window.validarReg(this.dataset.rid,true)">✅ ${r.campos?.estudou==='Sim'?'Validar Dia (+1 dia)':'Confirmar (sem +dia)'}</button>
        <button class="btn bd" style="flex:1;padding:11px;font-size:14px" data-rid="${r.id}" onclick="window.validarReg(this.dataset.rid,false)">❌ Rejeitar</button>
      </div>
    </div>`;
  }).join('');
  return`<div class="ph"><div><div class="ptitle">✅ Validações</div><div class="psub">${pendentes.length} registro${pendentes.length>1?'s':''} aguardando</div></div></div>${list}`;
}

window.validarReg=function(rid,aprovado){
  const r=(db.registros||[]).find(x=>x.id===rid);
  if(!r)return;
  r.validado=aprovado;
  r.validadoEm=new Date().toISOString();
  save();
  toast(aprovado?'✅ Dia validado!':'❌ Dia rejeitado.');

  // Verifica se deve gerar análise automática (a cada 7 registros validados)
  if(aprovado){
    const sid=r.studentId;
    const totalValidados=(db.registros||[]).filter(x=>
      x.studentId===sid&&x.origem==='Aluno'&&x.validado===true
    ).length;
    const totalAnalises=(db.analises||[]).filter(a=>a.studentId===sid).length;
    // Gera análise a cada 7 validados
    if(totalValidados>0 && totalValidados%7===0 && totalAnalises<Math.floor(totalValidados/7)){
      toast('🤖 Gerando análise automática...');
      setTimeout(()=>gerarAnaliseAuto(sid),500);
    }
  }

  renderApp();
};

function pageProjeto(){
  const s=(db.students||[]).find(x=>x.id===CSid);
  if(!s)return'';
  const u=s.userId?(db.users||[]).find(x=>x.id===s.userId):null;
  const dias=getDiasValidados(s.id);
  const fase=getFaseAtual(dias);
  const streak=getStreak(s.id);
  const ct=window['_pt']||'timeline';
  const tabs=['timeline','perfil','aluno_dados','motivacional','ia'];
  const tn=['📋 Timeline','🧠 Perfil','👤 Aluno','💬 Mensagem','🤖 IA'];
  const recs=(db.registros||[]).filter(r=>r.studentId===s.id).sort((a,b)=>b.data.localeCompare(a.data));
  let body='';
  if(ct==='timeline')body=adminTimeline(s,recs);
  else if(ct==='perfil')body=adminPerfil(s);
  else if(ct==='motivacional')body=adminMotivacional(s);
  else if(ct==='ia')body=adminIA(s);
  else body=adminAlunoDados(s);
  return`
    <div class="ph">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <button class="btn bg2 bsm" onclick="setPage('dashboard')">← Início</button>
        <div>
          <div class="ptitle">${s.nome}</div>
          <div class="psub">${fase.nome} · Dia ${dias} · ${streak} dias seguidos 🔥</div>
          ${u?`<div style="font-size:11px;margin-top:2px">Login: <b style="color:var(--a2);font-family:monospace">${u.username}</b> / <b style="color:var(--gold);font-family:monospace">${u.password}</b></div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn bgold bsm" onclick="gerarAnalise('${s.id}')">🤖 IA</button>
        <button class="btn bp bsm" onclick="openModal('registro')">+ Registro</button>
      </div>
    </div>
    <div class="tabs">${tabs.map((t,i)=>`<div class="tab ${ct===t?'act':''}" onclick="window._pt='${t}';document.getElementById('content').innerHTML=pageProjeto()">${tn[i]}</div>`).join('')}</div>
    ${body}`;
}

function adminTimeline(s,recs){
  const list=recs.map(r=>{
    const c=r.campos||{};
    const isAluno=r.origem==='Aluno';
    const emoji=EMOJIS.find(e=>e.val===c.disposicao)||EMOJIS[2];
    let status='';
    if(isAluno){
      if(r.validado===true)status=`<span class="badge bg_">✅ Validado</span>`;
      else if(r.validado===false)status=`<span class="badge br_">❌ Rejeitado</span>`;
      else status=`<span class="badge bgold_">⏳ Pendente</span>`;
    }
    let body='';
    if(isAluno){
      body=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:22px">${emoji.emoji}</span>
        <span style="font-size:12px;color:var(--muted2)">${emoji.label}</span>
        ${status}
      </div>
      ${c.sentimento?`<div style="font-size:13px;color:var(--muted2);font-style:italic;margin-bottom:4px">"${c.sentimento}"</div>`:''}
      ${c.vitoria?`<div style="font-size:12px;color:var(--green)">🏆 ${c.vitoria}</div>`:''}
      ${c.dificuldade?`<div style="font-size:12px;color:var(--red)">⚠️ ${c.dificuldade}</div>`:''}
      ${(r.origem==='Aluno'&&(r.validado===null||r.validado===undefined)&&(r.campos?.disposicao||r.campos?.sentimento))?`<div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn bgreen bsm" data-rid="${r.id}" onclick="window.validarReg(this.dataset.rid,true)">✅ Validar</button>
        <button class="btn bd bsm" data-rid="${r.id}" onclick="window.validarReg(this.dataset.rid,false)">❌ Rejeitar</button>
      </div>`:''}`;
    } else {
      body=`${c.execucao?`<div style="margin-bottom:6px"><span class="badge ${{'Cumpriu':'bg_','Cumpriu Parcialmente':'bo_','Não Cumpriu':'br_','Reprogramou':'bgold_','Não Respondeu':'bgr_'}[c.execucao]||'bgr_'}">${c.execucao}</span></div>`:''}
      ${c.resumo?`<div style="font-size:13px;color:var(--muted2)">${c.resumo}</div>`:''}
      ${c.observacao?`<div style="font-size:12px;color:var(--muted2);font-style:italic">"${c.observacao}"</div>`:''}
      ${c.descricao?`<div style="font-size:13px">${c.descricao}</div>`:''}`;
    }
    return`<div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge bb_">${r.origem}</span>
          <span style="font-size:11px;color:var(--muted)">por ${r.quemRegistrou||'—'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;color:var(--muted)">${fdate(r.data)}</span>
          ${!isAluno?`<button class="btn bg2 bsm" onclick="openModal('editRegistro','${r.id}')">✏️</button>`:''}
          <button class="btn bd bsm" data-rid="${r.id}" onclick="window.delReg(this.dataset.rid)">🗑</button>
        </div>
      </div>
      ${body}
    </div>`;
  }).join('')||'<div style="text-align:center;padding:30px;color:var(--muted)">Nenhum registro ainda.</div>';
  return`<div class="card"><div class="ctitle"><div class="cdot" style="background:#5b6af5"></div>Registros</div>${list}</div>`;
}

window.delReg=function(id){if(!confirm('Remover?'))return;db.registros=(db.registros||[]).filter(r=>r.id!==id);save();toast('Removido.');document.getElementById('content').innerHTML=pageProjeto();};

function adminMotivacional(s){
  const msg=s.msgMotivacional||null;
  return`<div class="card" style="max-width:560px">
    <div class="ctitle"><div class="cdot" style="background:#a78bfa"></div>💬 Mensagem Motivacional</div>
    <div style="font-size:12px;color:var(--muted2);margin-bottom:16px">Esta mensagem aparece no painel do aluno. Atualize sempre que quiser deixar um recado especial.</div>
    <div class="fg"><label>Mensagem *</label><textarea id="motiv_txt" style="min-height:120px" placeholder="Ex: Você está indo muito bem! Cada dia conta...">${msg?.texto||''}</textarea></div>
    <div class="fg"><label>Assinatura</label><input type="text" id="motiv_autor" placeholder="Ex: Maísa" value="${msg?.autor||'Maísa'}"></div>
    <button class="btn bp" style="width:100%;padding:12px;font-size:14px" onclick="saveMotivacional('${s.id}')">💾 Salvar Mensagem</button>
    ${msg?`<div style="margin-top:16px;padding:14px;background:linear-gradient(135deg,rgba(91,106,245,.08),transparent);border:1px solid rgba(91,106,245,.2);border-radius:var(--r)">
      <div style="font-size:10px;color:var(--a2);text-transform:uppercase;font-weight:700;margin-bottom:8px">Preview — como o aluno vê:</div>
      <div style="font-size:14px;color:var(--text);font-style:italic;line-height:1.7">"${msg.texto}"</div>
      <div style="font-size:11px;color:var(--muted);text-align:right;margin-top:8px">— ${msg.autor||'Coach'} · ${fdate(msg.data)}</div>
    </div>`:''}
  </div>`;
}

function saveMotivacional(sid){
  const txt=document.getElementById('motiv_txt')?.value.trim();
  const autor=document.getElementById('motiv_autor')?.value.trim()||'Maísa';
  if(!txt){alert('Escreva uma mensagem!');return;}
  const s=(db.students||[]).find(x=>x.id===sid);if(!s)return;
  s.msgMotivacional={texto:txt,autor,data:today()};
  save();toast('✓ Mensagem salva!');document.getElementById('content').innerHTML=pageProjeto();
}

function adminIA(s){
  const analises=(db.analises||[]).filter(a=>a.studentId===s.id).sort((a,b)=>b.geradoEm.localeCompare(a.geradoEm));
  const aiH=analises.map((a,i)=>`
    <div class="aibox" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">

// CALENDÁRIO SEMANAL + META %
// ══════════════════════════════════════════════
const DIAS_LABEL=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function getInicioSemana(d){
  const dt=new Date(d);
  const dow=dt.getDay();
  dt.setDate(dt.getDate()-dow);
  return dt;
}

function calcPctMeta(sid){
  const s=(db.students||[]).find(x=>x.id===sid);
  if(!s)return 0;
  const cfg=s.metaCfg||{horasDia:1,folgas:[]};
  const folgas=cfg.folgas||[];
  const hMeta=cfg.horasDia||1;
  // Dias ativos na semana atual
  const ini=getInicioSemana(today());
  let totalMeta=0,totalFeito=0;
  for(let i=0;i<7;i++){
    const d=new Date(ini);d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const dow=d.getDay();
    if(folgas.includes(dow))continue;
    if(ds>today())continue; // dia futuro não conta ainda
    totalMeta+=hMeta;
    // Busca registro do dia
    const reg=(db.registros||[]).find(r=>r.studentId===sid&&r.origem==='meta_dia'&&r.data===ds);
    if(reg){
      if(reg.campos?.status==='Cumpriu')totalFeito+=hMeta;
      else if(reg.campos?.status==='Parcialmente')totalFeito+=(parseFloat(reg.campos.horas)||0);
    }
  }
  if(totalMeta===0)return 0;
  return Math.round(totalFeito/totalMeta*100);
}

function calendarioSemanal(st){
  const cfg=st.metaCfg||{};
  const metaConfigurada=!!(cfg.horasDia&&cfg.folgas!==undefined);
  const folgas=cfg.folgas||[];
  const hMeta=cfg.horasDia||1;
  const ini=getInicioSemana(today());
  const hj=today();
  const agora=new Date();
  const sabado=new Date(ini);sabado.setDate(sabado.getDate()+6);sabado.setHours(19,0,0,0);
  const dentroPrazo=agora<sabado;

  const dias=[];
  for(let i=0;i<7;i++){
    const d=new Date(ini);d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const dow=d.getDay();
    const folga=folgas.includes(dow);
    const futuro=ds>hj;
    const reg=(db.registros||[]).find(r=>r.studentId===st.id&&r.origem==='meta_dia'&&r.data===ds);
    let pct=0;
    if(reg){
      if(reg.campos?.status==='Cumpriu')pct=100;
      else if(reg.campos?.status==='Parcialmente')pct=Math.min(100,Math.round((parseFloat(reg.campos.horas)||0)/hMeta*100));
    }
    dias.push({ds,dow,folga,futuro,reg,pct,dia:d.getDate()});
  }

  const diasAtivos=dias.filter(d=>!d.folga&&!d.futuro);
  const totalMeta=diasAtivos.length*hMeta;
  const totalFeito=diasAtivos.reduce((a,d)=>{
    if(!d.reg)return a;
    if(d.reg.campos?.status==='Cumpriu')return a+hMeta;
    if(d.reg.campos?.status==='Parcialmente')return a+(parseFloat(d.reg.campos.horas)||0);
    return a;
  },0);
  const pctSemana=totalMeta>0?Math.round(totalFeito/totalMeta*100):0;
  const corSemana=pctSemana>=80?'var(--green)':pctSemana>=50?'var(--gold)':'var(--red)';

  const cards=dias.map(d=>{
    if(d.folga)return`<div style="background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;opacity:.4">
      <div style="font-size:10px;color:var(--muted);font-weight:600">${DIAS_LABEL[d.dow]}</div>
      <div style="font-size:11px;color:var(--muted)">${d.dia}</div>
      <div style="font-size:18px;margin:4px 0">😴</div>
      <div style="font-size:9px;color:var(--muted)">Folga</div>
    </div>`;

    const cor=d.pct>=100?'var(--green)':d.pct>0?'var(--gold)':d.futuro?'var(--border)':'var(--muted)';
    const isHj=d.ds===hj;
    // Só mostra "Registrar" se meta configurada, dia não futuro e dentro do prazo
    const podeReg=metaConfigurada&&!d.futuro&&dentroPrazo;

    return`<div onclick="${podeReg?`openModal('metaDia','${st.id}','${d.ds}')`:''}" style="background:${d.pct>=100?'rgba(52,211,153,.08)':d.pct>0?'rgba(240,180,41,.08)':'var(--s2)'};border:1px solid ${isHj?'var(--accent)':d.pct>0?cor:'var(--border)'};border-radius:10px;padding:10px 6px;text-align:center;cursor:${podeReg?'pointer':'default'};transition:all .15s;${isHj?'box-shadow:0 0 8px rgba(91,106,245,.3)':''}">
      <div style="font-size:10px;color:${isHj?'var(--a2)':'var(--muted)'};font-weight:600">${DIAS_LABEL[d.dow]}</div>
      <div style="font-size:11px;color:var(--muted2)">${d.dia}</div>
      <div style="font-size:18px;margin:4px 0">${d.reg?(d.pct>=100?'✅':d.pct>0?'⚡':'❌'):(d.futuro?'·':metaConfigurada?'📝':'·')}</div>
      <div style="font-size:10px;font-weight:700;color:${cor}">${d.reg?`${d.pct}%`:(d.futuro?'':metaConfigurada?'Registrar':'')}</div>
    </div>`;
  }).join('');

  return`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="ctitle" style="margin-bottom:0"><div class="cdot" style="background:#5b6af5"></div>Calendário Semanal</div>
      ${metaConfigurada?`<div style="text-align:right"><div style="font-size:18px;font-weight:800;color:${corSemana}">${pctSemana}%</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">meta da semana</div></div>`:''}
    </div>
    ${metaConfigurada?`<div class="prog-wrap" style="margin-bottom:10px"><div class="prog-fill" style="width:${pctSemana}%;background:${corSemana}"></div></div>`:''}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">${cards}</div>
    ${metaConfigurada?`<div style="font-size:10px;color:var(--muted);text-align:center">⏰ Prazo para registrar dias passados: <strong style="color:var(--gold)">Sábado até 19h</strong>${!dentroPrazo?' · <span style="color:var(--red)">Prazo encerrado</span>':''}</div>
    <div style="font-size:10px;color:var(--muted2);text-align:center;margin-top:3px">Meta: ${hMeta}h/dia · ${totalMeta.toFixed(1)}h total na semana</div>`
    :`<div style="font-size:12px;color:var(--muted);text-align:center;padding:6px 0">⏳ Aguardando configuração do coach para liberar registros</div>`}
  </div>`;

            </div>`;

          `:`
            <div style="font-size:13px;color:var(--muted);text-align:center;padding:20px 0">—</div>
          `}
        </div>

        <!-- CALENDÁRIO (abaixo na coluna direita) -->
        ${calendarioSemanal(st)}
      </div>
    </div>
  </div>`;
}

}
function alunoRanking(){
  const st=(db.students||[]).find(s=>s.userId===CU.id);
  const ranking=(db.students||[]).map(s=>{
    const d=getDiasValidados(s.id);
    const pct=calcPctMeta(s.id);
    const str=getStreak(s.id);
    return{...s,dias:d,pct,streak:str};
  }).sort((a,b)=>b.pct-a.pct||b.dias-a.dias);
  const medals=['🥇','🥈','🥉'];
  const list=ranking.map((r,i)=>{
    const isMe=r.id===st?.id;
    const corPct=r.pct>=80?'var(--green)':r.pct>=50?'var(--gold)':'var(--red)';
    return`<div style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--r);margin-bottom:8px;background:${isMe?'rgba(91,106,245,.1)':'var(--s2)'};border:1px solid ${isMe?'var(--a2)':'var(--border)'}">
      <div style="font-size:${i<3?'28px':'18px'};width:36px;text-align:center;font-weight:800;color:var(--muted)">${medals[i]||`#${i+1}`}</div>
      <div class="sav" style="width:38px;height:38px;font-size:14px;font-weight:800;border-radius:50%;background:${acolor(r.nome)}22;color:${acolor(r.nome)};flex-shrink:0">${ini(r.nome)}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:${isMe?'800':'600'};color:${isMe?'var(--a2)':'var(--text)'}">${r.nome}${isMe?' 👈':''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">🔥 ${r.streak} seguidos · ${r.dias} dias totais</div>
        <div class="prog-wrap" style="margin-top:5px;height:4px"><div class="prog-fill" style="width:${r.pct}%;background:${corPct}"></div></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:800;color:${corPct}">${r.pct}%</div>
        <div style="font-size:10px;color:var(--muted)">da meta</div>
      </div>

  }).join('')||'<div style="text-align:center;padding:40px;color:var(--muted)">Nenhum dado ainda.</div>';
  return`
    <div class="ph"><div>
      <button class="btn bg2 bsm" onclick="setPage('aluno_painel')" style="margin-bottom:8px">← Início</button>
      <div class="ptitle">🚀 Ranking</div><div class="psub">Ordenado por % da meta semanal</div>
    </div></div>
    <div style="background:linear-gradient(135deg,rgba(240,180,41,.06),transparent);border:1px solid rgba(240,180,41,.2);border-radius:var(--r);padding:14px;margin-bottom:16px;text-align:center">
      <div style="font-size:28px;margin-bottom:6px">🏆</div>
      <div style="font-size:13px;color:var(--muted2)">Quem cumpriu mais a <strong>sua própria meta</strong> está na frente.<br>Justo para todos!</div>
    </div>
    ${list}`;
}

function selEmoji(val,el){
  RV['disp']=val;
  document.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  const label=EMOJIS.find(e=>e.val===val);
  const lbl=document.getElementById('emojiLabel');
  if(lbl&&label)lbl.textContent=label.label;
}

function saveAlunoReg(){
  const st=(db.students||[]).find(s=>s.userId===CU.id);
  if(!st){toast('Perfil não configurado.');return;}
  if(!db.registros)db.registros=[];
  db.registros.push({
    id:uid(),studentId:st.id,authorId:CU.id,
    data:document.getElementById('af_d')?.value||today(),
    origem:'Aluno',quemRegistrou:CU.nome,
    validado:null,
    campos:{
      disposicao:RV['disp']||'Média',
      sentimento:gv('af_s'),dificuldade:gv('af_dif'),vitoria:gv('af_v')
    }
  });
  save();RV={};toast('✅ Registro enviado! Aguardando validação.');setPage('aluno_painel');
}

function alunoEvolucao(){
  const st=(db.students||[]).find(s=>s.userId===CU.id);
  if(!st)return'<div style="text-align:center;padding:40px;color:var(--muted)">Perfil não configurado.</div>';
  const recs=(db.registros||[]).filter(r=>r.studentId===st.id&&r.origem==='Aluno').sort((a,b)=>b.data.localeCompare(a.data));
  const list=recs.map(r=>{
    const emoji=EMOJIS.find(e=>e.val===r.campos?.disposicao)||EMOJIS[2];
    const avatarClass=r.validado===true?'validado':r.validado===false?'rejeitado':'pendente';
    const statusIcon=r.validado===true?'✅':r.validado===false?'❌':'⏳';
    return`<div class="tl-dia">
      <div class="tl-dia-avatar ${avatarClass}">${emoji.emoji}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div style="font-size:12px;font-weight:600">${fdate(r.data)}</div>
          <div style="display:flex;align-items:center;gap:6px">
            ${r.campos?.horas?`<span style="font-size:11px;color:var(--a2);font-weight:700">⏱ ${r.campos.horas}h</span>`:''}
            <span style="font-size:14px">${statusIcon}</span>
            ${r.validado===false?`<span style="font-size:10px;color:var(--red)">Dia não validado pelo coach</span>`:''}
            ${r.validado===true?`<span style="font-size:10px;color:var(--green)">Dia validado</span>`:''}
            ${r.validado===null||r.validado===undefined?`<span style="font-size:10px;color:var(--gold)">Aguardando validação</span>`:''}
          </div>
        </div>
        ${r.campos?.sentimento?`<div style="font-size:12px;color:var(--muted2);font-style:italic">"${r.campos.sentimento}"</div>`:''}
        ${r.campos?.vitoria?`<div style="font-size:11px;color:var(--green);margin-top:2px">🏆 ${r.campos.vitoria}</div>`:''}
      </div>
    </div>`;
  }).join('')||'<div style="text-align:center;padding:40px;color:var(--muted)">Nenhum registro ainda.</div>';
  const dias=getDiasValidados(st.id);
  const total=recs.length;
  const validados=recs.filter(r=>r.validado===true).length;
  const rejeitados=recs.filter(r=>r.validado===false).length;
  return`
    <div class="sgrid" style="grid-template-columns:repeat(3,1fr)">
      <div class="sc"><div class="sv">${total}</div><div class="sl">Enviados</div></div>
      <div class="sc"><div class="sv" style="color:var(--green)">${validados}</div><div class="sl">Validados</div></div>
      <div class="sc"><div class="sv" style="color:var(--red)">${rejeitados}</div><div class="sl">Rejeitados</div></div>
    </div>
    <div class="card"><div class="ctitle"><div class="cdot" style="background:#5b6af5"></div>Sua Linha do Tempo</div>${list}</div>`;
}

function alunoPerfil(){
  const st=(db.students||[]).find(s=>s.userId===CU.id);
  if(!st)return'';
  const dias=getDiasValidados(st.id);
  const fase=getFaseAtual(dias);
  const mt=st.metas||[];
  const hj=today();
  function ms(m){
    if(m.status==='Concluída')return{l:'Concluída',c:'bg_',i:'✅'};
    if(!m.prazo)return{l:'Em andamento',c:'bb_',i:'🔵'};
    if(m.prazo<hj)return{l:'Em atraso',c:'br_',i:'🔴'};
    if((new Date(m.prazo)-new Date(hj))/86400000<=3)return{l:'Em breve',c:'bgold_',i:'🟡'};
    return{l:'Em dia',c:'bg_',i:'🟢'};
  }
  return`
    <div class="card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div class="sav" style="width:50px;height:50px;font-size:18px;font-weight:800;border-radius:50%;background:${acolor(st.nome)}22;color:${acolor(st.nome)};border:2px solid ${acolor(st.nome)}">${ini(st.nome)}</div>
        <div>
          <div style="font-size:16px;font-weight:800">${st.nome}</div>
          <div style="font-size:12px;color:var(--muted)">${st.objetivo||'Sem objetivo'}</div>
          <div style="font-size:11px;margin-top:3px;color:${fase.cor}">${fase.nome} · Dia ${dias}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle"><div class="cdot" style="background:#f0b429"></div>Metas</div>
      ${mt.length?mt.map(m=>{const s=ms(m);return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
        <div><div style="font-size:13px;font-weight:600">${m.titulo}</div>${m.prazo?`<div style="font-size:11px;color:var(--muted)">${fdate(m.prazo)}</div>`:''}</div>
        <span class="badge ${s.c}">${s.i} ${s.l}</span>
      </div>`;}).join(''):'<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Metas definidas pelo coach nas sessões.</div>'}
    </div>`;
}

  const pin=String(Math.floor(1000+Math.random()*9000));

function saveMetaDia(sid,data,hMeta){

// Verifica se algum aluno precisa de análise automática (a cada 7 dias desde a última)
async function verificarAnaliseAuto(){
  const hoje=today();
  for(const s of(db.students||[])){
    const ultimaAnalise=(db.analises||[]).filter(a=>a.studentId===s.id).sort((a,b)=>b.geradoEm.localeCompare(a.geradoEm))[0];
    const ultimoReg=(db.registros||[]).filter(r=>r.studentId===s.id&&r.validado===true).sort((a,b)=>b.data.localeCompare(a.data))[0];
    if(!ultimoReg)continue;
    // Calcula dias desde a última análise (ou desde o primeiro registro se nunca gerou)
    const refData=ultimaAnalise?ultimaAnalise.geradoEm.slice(0,10):ultimoReg.data;
    const diffDias=Math.floor((new Date(hoje)-new Date(refData))/86400000);
    if(diffDias>=7){
      await gerarAnalise(s.id,true);
    }
  }
}
function salvarAI(sid){const t=document.getElementById('ai_r')?.value.trim();if(!t){alert('Cole a resposta!');return;}if(!db.analises)db.analises=[];db.analises.push({id:uid(),studentId:sid,geradoEm:new Date().toISOString(),conteudo:t});save();closeModal();toast('✓ Análise salva!');window._pt='ia';document.getElementById('content').innerHTML=pageProjeto();}

function closeModal(){document.getElementById('mo').classList.add('hidden');RV={};}
function closeModalOutside(e){if(e.target===document.getElementById('mo'))closeModal();}
